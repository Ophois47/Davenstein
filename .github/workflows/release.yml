name: Build Davenstein Releases

on:
  workflow_dispatch:
    inputs:
      build_target:
        description: Build only the selected platform during manual runs
        required: true
        default: all
        type: choice
        options:
          - all
          - windows
          - windows-arm64
          - linux-x86_64
          - linux-arm64
          - linux-armv7
          - freebsd-x86_64
          - macos-arm64
          - macos-intel
          - macos-universal
  push:
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: read

jobs:
  build-windows:
    name: Build Windows Installer
    if: github.event_name == 'push' || inputs.build_target == 'all' || inputs.build_target == 'windows'
    runs-on: ubuntu-latest

    steps:
      - name: Check Out Source
        uses: actions/checkout@v7

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Resolve Release Version
        id: version
        shell: bash
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            version="${GITHUB_REF_NAME#v}"
          else
            version=$(sed -nE 's/^version = "([^"]+)"/\1/p' Cargo.toml | head -n 1)
          fi

          test -n "$version"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "Building Windows version $version"

      - name: Install Cross
        run: cargo install cross --version 0.2.5 --locked

      - name: Build Davenstein for Windows
        run: cross build --release --locked --target x86_64-pc-windows-gnu --bin Davenstein

      - name: Build Asset Packer
        run: |
          mkdir -p target/release
          rustc --edition=2024 -O src/pak_builder.rs -o target/release/pak_builder

      - name: Build Assets
        run: ./target/release/pak_builder --root assets --out assets.pak

      - name: Install Windows Packaging Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends nsis unzip zip

      - name: Stage Installer Payload
        run: |
          rm -rf packaging/windows/payload
          mkdir -p packaging/windows/payload
          cp target/x86_64-pc-windows-gnu/release/Davenstein.exe packaging/windows/payload/
          cp assets.pak packaging/windows/payload/
          cp README.md packaging/windows/payload/
          cp \
            LICENSE.md \
            LICENSE-MIT \
            LICENSE-APACHE \
            COPYRIGHT.md \
            THIRD_PARTY_ASSETS.md \
            packaging/windows/payload/

      - name: Build Installer
        working-directory: packaging/windows
        run: makensis "-DVERSION=${{ steps.version.outputs.version }}" installer.nsi

      - name: Build Windows Portable Archive
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: packaging/windows/build-portable.sh

      - name: Validate Windows Portable Archive
        shell: bash
        run: |
          archive=$(find target/portable \
            -maxdepth 1 \
            -type f \
            -name 'Davenstein-*-windows-x86_64-portable.zip' \
            -print \
            -quit)

          test -n "$archive"
          test -f "$archive.sha256"

          (
            cd target/portable
            sha256sum --check "$(basename "$archive.sha256")"
          )

          extract_dir="$RUNNER_TEMP/davenstein-windows-x86_64"

          rm -rf "$extract_dir"
          mkdir -p "$extract_dir"

          unzip -q "$archive" -d "$extract_dir"

          package_root=$(find "$extract_dir" \
            -mindepth 1 \
            -maxdepth 1 \
            -type d \
            -print \
            -quit)

          test -n "$package_root"

          for name in \
            Davenstein.exe \
            assets.pak \
            README.md \
            LICENSE.md \
            LICENSE-MIT \
            LICENSE-APACHE \
            COPYRIGHT.md \
            THIRD_PARTY_ASSETS.md \
            Davenstein.ico \
            portable.flag
          do
            test -e "$package_root/$name"
          done

          test -s "$package_root/Davenstein.exe"
          test -s "$package_root/assets.pak"

          file "$package_root/Davenstein.exe"
          file "$package_root/Davenstein.exe" |
            grep -Eiq 'PE32\+.*x86-64'

      - name: Create Checksum
        working-directory: packaging/windows
        run: |
          sha256sum "Davenstein-Setup-${{ steps.version.outputs.version }}.exe" \
            > "Davenstein-Setup-${{ steps.version.outputs.version }}.exe.sha256"

      - name: Stage Windows Release Packages
        run: |
          rm -rf target/release-artifacts/windows
          mkdir -p target/release-artifacts/windows
          cp packaging/windows/Davenstein-Setup-*.exe target/release-artifacts/windows/
          cp packaging/windows/Davenstein-Setup-*.exe.sha256 target/release-artifacts/windows/
          cp target/portable/Davenstein-*-windows-x86_64-portable.zip target/release-artifacts/windows/
          cp target/portable/Davenstein-*-windows-x86_64-portable.zip.sha256 target/release-artifacts/windows/

      - name: Upload Windows Packages
        uses: actions/upload-artifact@v7
        with:
          name: Davenstein-Windows-Packages
          path: target/release-artifacts/windows/*
          if-no-files-found: error

  build-windows-arm64:
    name: Build Windows ARM64 Portable Archive
    if: github.event_name == 'push' || inputs.build_target == 'all' || inputs.build_target == 'windows-arm64'
    runs-on: windows-11-arm

    steps:
      - name: Check Out Source
        uses: actions/checkout@v7

      - name: Install Rust
        shell: pwsh
        run: |
          rustup toolchain install stable --profile minimal --target aarch64-pc-windows-msvc
          rustup default stable
          rustc -vV
          cargo -vV

      - name: Resolve Release Version
        id: version
        shell: pwsh
        run: |
          $match = Select-String -Path Cargo.toml -Pattern '^version = "([^"]+)"' | Select-Object -First 1

          if (-not $match) {
              throw "Could not determine the Davenstein version"
          }

          $cargoVersion = $match.Matches[0].Groups[1].Value

          if ($env:GITHUB_REF -like "refs/tags/v*") {
              $version = $env:GITHUB_REF_NAME.Substring(1)
          } else {
              $version = $cargoVersion
          }

          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          Write-Host "Building Windows ARM64 version $version"

      - name: Build Davenstein for Windows ARM64
        shell: pwsh
        env:
          CARGO_BUILD_JOBS: 2
        run: cargo build --release --locked --target aarch64-pc-windows-msvc --bin Davenstein

      - name: Validate Windows ARM64 Executable
        shell: pwsh
        run: |
          $headers = & llvm-readobj --file-headers target\aarch64-pc-windows-msvc\release\Davenstein.exe
          $headers

          if (-not ($headers -match "IMAGE_FILE_MACHINE_ARM64")) {
              throw "Davenstein.exe is not a Windows ARM64 executable"
          }

      - name: Build Asset Packer
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path target\release | Out-Null
          rustc --edition=2024 -O src/pak_builder.rs -o target\release\pak_builder.exe

      - name: Build Assets
        shell: pwsh
        run: |
          & .\target\release\pak_builder.exe `
              --root assets `
              --out target\release\assets.pak

      - name: Build Windows ARM64 Portable Archive
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.version }}"
          $archiveBase = "Davenstein-$version-windows-arm64"
          $portableRoot = Join-Path $PWD "target\portable"
          $stageDir = Join-Path $portableRoot $archiveBase
          $archivePath = Join-Path $portableRoot "$archiveBase-portable.zip"
          $checksumPath = "$archivePath.sha256"

          Remove-Item -Recurse -Force $stageDir -ErrorAction SilentlyContinue
          Remove-Item -Force $archivePath, $checksumPath -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Force -Path $stageDir | Out-Null

          Copy-Item target\aarch64-pc-windows-msvc\release\Davenstein.exe (Join-Path $stageDir "Davenstein.exe")
          Copy-Item target\release\assets.pak (Join-Path $stageDir "assets.pak")
          Copy-Item README.md (Join-Path $stageDir "README.md")

          foreach ($name in @(
              "LICENSE.md",
              "LICENSE-MIT",
              "LICENSE-APACHE",
              "COPYRIGHT.md",
              "THIRD_PARTY_ASSETS.md"
          )) {
              Copy-Item $name (Join-Path $stageDir $name)
          }

          Copy-Item packaging\windows\Davenstein.ico (Join-Path $stageDir "Davenstein.ico")
          New-Item -ItemType File -Force -Path (Join-Path $stageDir "portable.flag") | Out-Null

          Compress-Archive `
              -LiteralPath $stageDir `
              -DestinationPath $archivePath `
              -CompressionLevel Optimal

          $hash = (Get-FileHash -LiteralPath $archivePath -Algorithm SHA256).Hash.ToLowerInvariant()
          "$hash  $(Split-Path -Leaf $archivePath)" |
              Set-Content -LiteralPath $checksumPath -Encoding ascii

          Write-Host "Created $archivePath"
          Write-Host "Created $checksumPath"

      - name: Validate Windows ARM64 Portable Archive
        shell: pwsh
        run: |
          $archive = Get-ChildItem target\portable\Davenstein-*-windows-arm64-portable.zip |
              Select-Object -First 1

          if (-not $archive) {
              throw "Windows ARM64 portable archive was not created"
          }

          $extractDir = Join-Path $env:RUNNER_TEMP "davenstein-windows-arm64"
          Remove-Item -Recurse -Force $extractDir -ErrorAction SilentlyContinue
          Expand-Archive -LiteralPath $archive.FullName -DestinationPath $extractDir

          $packageRoot = Get-ChildItem $extractDir -Directory | Select-Object -First 1

          foreach ($name in @(
              "Davenstein.exe",
              "assets.pak",
              "README.md",
              "LICENSE.md",
              "LICENSE-MIT",
              "LICENSE-APACHE",
              "COPYRIGHT.md",
              "THIRD_PARTY_ASSETS.md",
              "Davenstein.ico",
              "portable.flag"
          )) {
              if (-not (Test-Path (Join-Path $packageRoot.FullName $name))) {
                  throw "Portable archive is missing $name"
              }
          }

          $hash = (Get-FileHash -LiteralPath $archive.FullName -Algorithm SHA256).Hash.ToLowerInvariant()
          $checksum = Get-Content "$($archive.FullName).sha256"

          if (-not $checksum.Trim().StartsWith($hash)) {
              throw "Windows ARM64 portable archive checksum does not match"
          }

      - name: Stage Windows ARM64 Release Packages
        shell: pwsh
        run: |
          $output = "target\release-artifacts\windows-arm64"
          Remove-Item -Recurse -Force $output -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Force -Path $output | Out-Null

          Copy-Item target\portable\Davenstein-*-windows-arm64-portable.zip $output
          Copy-Item target\portable\Davenstein-*-windows-arm64-portable.zip.sha256 $output

      - name: Upload Windows ARM64 Packages
        uses: actions/upload-artifact@v7
        with:
          name: Davenstein-Windows-ARM64-Packages
          path: target/release-artifacts/windows-arm64/*
          if-no-files-found: error

  build-linux:
    name: Build Linux x86_64 Packages
    if: github.event_name == 'push' || inputs.build_target == 'all' || inputs.build_target == 'linux-x86_64'
    runs-on: ubuntu-22.04

    steps:
      - name: Check Out Source
        uses: actions/checkout@v7

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            curl \
            dpkg-dev \
            file \
            gzip \
            lintian \
            libasound2-dev \
            libudev-dev \
            libwayland-dev \
            libx11-dev \
            libxcursor-dev \
            libxi-dev \
            libxkbcommon-dev \
            libxrandr-dev \
            pkg-config

      - name: Resolve Release Version
        id: version
        shell: bash
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            version="${GITHUB_REF_NAME#v}"
          else
            version=$(sed -nE 's/^version = "([^"]+)"/\1/p' Cargo.toml | head -n 1)
          fi

          test -n "$version"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "Building Linux version $version"

      - name: Build Davenstein AppImage
        run: |
          VERSION="${{ steps.version.outputs.version }}" \
            packaging/linux/build-appimage.sh

      - name: Build Linux Portable Archive
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: packaging/linux/build-portable.sh

      # Reuse the Ubuntu 22.04 x86_64 release binary so the Debian package
      # retains an older Linux ABI baseline instead of inheriting Ubuntu 24.04
      # requirements such as libasound2t64 and glibc 2.39.
      - name: Build Debian Package
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: packaging/debian/build-package.sh

      # Validate the archive as both a standalone Debian artifact and an
      # installed system package. This catches metadata, dependency, layout,
      # permissions, runtime-linking, and package-removal regressions.
      - name: Validate Debian Package
        shell: bash
        run: |
          release_version="${{ steps.version.outputs.version }}"
          deb="target/debian/Davenstein-${release_version}-linux-amd64.deb"
          checksum="${deb}.sha256"

          case "$release_version" in
            *-*)
              upstream_version=${release_version%%-*}
              prerelease_version=${release_version#*-}
              expected_debian_version="${upstream_version}~${prerelease_version}-1"
              ;;
            *)
              expected_debian_version="${release_version}-1"
              ;;
          esac

          test -f "$deb"
          test -f "$checksum"

          (
            cd target/debian
            sha256sum --check "$(basename "$checksum")"
          )

          test "$(dpkg-deb --field "$deb" Package)" = "davenstein"
          test "$(dpkg-deb --field "$deb" Version)" = "$expected_debian_version"
          test "$(dpkg-deb --field "$deb" Architecture)" = "amd64"

          depends=$(dpkg-deb --field "$deb" Depends)
          printf 'Debian dependencies: %s\n' "$depends"

          # The Jammy build must retain the traditional libasound2 dependency.
          # Requiring libasound2t64 would unnecessarily restrict the package to
          # newer Ubuntu releases.
          printf '%s\n' "$depends" |
            grep -Eq '(^|, )libasound2 \(>='

          if printf '%s\n' "$depends" |
            grep -Fq 'libasound2t64'
          then
            echo "Debian package unexpectedly requires libasound2t64" >&2
            exit 1
          fi

          libc_requirement=$(
            printf '%s\n' "$depends" |
              sed -n 's/.*libc6 (>= \([^)]*\)).*/\1/p'
          )

          test -n "$libc_requirement"

          # Ubuntu 22.04 provides glibc 2.35. Reject a package whose generated
          # dependency claims a newer ABI, since it would defeat the purpose of
          # building the Debian artifact on the older release runner.
          if ! dpkg --compare-versions "$libc_requirement" le 2.35
          then
            echo "Debian package requires libc6 newer than Ubuntu 22.04" >&2
            exit 1
          fi

          lintian --fail-on error "$deb"

          extract_dir="$RUNNER_TEMP/davenstein-debian-extract"

          rm -rf "$extract_dir"
          mkdir -p "$extract_dir"

          # Inspect the package without installing it first. This verifies
          # the archive layout independently from apt and avoids allowing package
          # manager behavior to conceal a missing or misplaced payload file.
          dpkg-deb --extract "$deb" "$extract_dir"

          for path in \
            usr/games/Davenstein \
            usr/lib/davenstein/Davenstein \
            usr/lib/davenstein/assets.pak \
            usr/share/applications/davenstein.desktop \
            usr/share/icons/hicolor/256x256/apps/davenstein.png \
            usr/share/doc/davenstein/README.md \
            usr/share/doc/davenstein/LICENSE.md \
            usr/share/doc/davenstein/LICENSE-MIT \
            usr/share/doc/davenstein/COPYRIGHT.md \
            usr/share/doc/davenstein/THIRD_PARTY_ASSETS.md \
            usr/share/doc/davenstein/copyright \
            usr/share/doc/davenstein/changelog.Debian.gz \
            usr/share/man/man6/Davenstein.6.gz
          do
            test -e "$extract_dir/$path"
          done

          test -x "$extract_dir/usr/games/Davenstein"
          test -x "$extract_dir/usr/lib/davenstein/Davenstein"
          test -s "$extract_dir/usr/lib/davenstein/assets.pak"
          test ! -e "$extract_dir/usr/bin/Davenstein"
          test ! -e "$extract_dir/usr/lib/davenstein/portable.flag"

          # LICENSE-APACHE is intentionally a relative symbolic link to Debian's
          # canonical Apache-2.0 license. Its target exists only after installation
          # beneath a complete Debian filesystem, so validate the link separately.
          test -L \
            "$extract_dir/usr/share/doc/davenstein/LICENSE-APACHE"

          test "$(
            readlink \
              "$extract_dir/usr/share/doc/davenstein/LICENSE-APACHE"
          )" = "../../common-licenses/Apache-2.0"

          grep -Fx \
            'exec /usr/lib/davenstein/Davenstein "$@"' \
            "$extract_dir/usr/games/Davenstein"

          grep -Fx \
            'Exec=/usr/games/Davenstein' \
            "$extract_dir/usr/share/applications/davenstein.desktop"

          gzip -t \
            "$extract_dir/usr/share/doc/davenstein/changelog.Debian.gz"

          gzip -t \
            "$extract_dir/usr/share/man/man6/Davenstein.6.gz"

          file "$extract_dir/usr/lib/davenstein/Davenstein"
          file "$extract_dir/usr/lib/davenstein/Davenstein" |
            grep -Eiq 'ELF 64-bit.*x86-64.*stripped'

          if ldd "$extract_dir/usr/lib/davenstein/Davenstein" |
            grep -F 'not found'
          then
            echo "Extracted Debian executable has unresolved libraries" >&2
            exit 1
          fi

          # Perform a real apt installation after archive inspection to
          # prove dependency resolution, maintainer metadata, filesystem placement,
          # desktop integration, and installed runtime linking all work together.
          sudo apt-get install -y "$GITHUB_WORKSPACE/$deb"

          test "$(
            dpkg-query -W -f='${db:Status-Status}' davenstein
          )" = "installed"

          test "$(
            dpkg-query -W -f='${Version}' davenstein
          )" = "$expected_debian_version"

          test "$(
            dpkg-query -W -f='${Architecture}' davenstein
          )" = "amd64"

          test -x /usr/games/Davenstein
          test ! -e /usr/bin/Davenstein
          test -x /usr/lib/davenstein/Davenstein
          test -s /usr/lib/davenstein/assets.pak
          test ! -e /usr/lib/davenstein/portable.flag

          test -L /usr/share/doc/davenstein/LICENSE-APACHE
          test -f /usr/share/common-licenses/Apache-2.0

          grep -Fx \
            'Exec=/usr/games/Davenstein' \
            /usr/share/applications/davenstein.desktop

          sh -n /usr/games/Davenstein
          gzip -t /usr/share/doc/davenstein/changelog.Debian.gz
          gzip -t /usr/share/man/man6/Davenstein.6.gz
          dpkg -V davenstein

          if ldd /usr/lib/davenstein/Davenstein |
            grep -F 'not found'
          then
            echo "Installed Debian executable has unresolved libraries" >&2
            exit 1
          fi

          # Remove the package and verify that every owned application file
          # disappears. This guards against stale launchers, assets, documentation,
          # icons, and package directories surviving an uninstall.
          sudo apt-get remove -y davenstein

          for path in \
            /usr/games/Davenstein \
            /usr/bin/Davenstein \
            /usr/lib/davenstein/Davenstein \
            /usr/lib/davenstein/assets.pak \
            /usr/share/applications/davenstein.desktop \
            /usr/share/icons/hicolor/256x256/apps/davenstein.png \
            /usr/share/doc/davenstein \
            /usr/share/man/man6/Davenstein.6.gz
          do
            test ! -e "$path"
          done

          if dpkg-query \
            -W \
            -f='${db:Status-Status}\n' \
            davenstein \
            2>/dev/null |
            grep -qx installed
          then
            echo "Davenstein remains installed after removal" >&2
            exit 1
          fi

      - name: Validate Linux x86_64 Packages
        shell: bash
        run: |
          appimage=$(find target/appimage \
            -maxdepth 1 \
            -type f \
            -name 'Davenstein-*-x86_64.AppImage' \
            -print \
            -quit)

          portable=$(find target/portable \
            -maxdepth 1 \
            -type f \
            -name 'Davenstein-*-linux-x86_64.tar.gz' \
            -print \
            -quit)

          test -n "$appimage"
          test -n "$portable"
          test -f "$appimage.sha256"
          test -f "$portable.sha256"

          (
            cd target/appimage
            sha256sum --check "$(basename "$appimage.sha256")"
          )

          (
            cd target/portable
            sha256sum --check "$(basename "$portable.sha256")"
          )

          appimage_extract="$RUNNER_TEMP/davenstein-linux-x86_64-appimage"
          portable_extract="$RUNNER_TEMP/davenstein-linux-x86_64-portable"

          rm -rf "$appimage_extract" "$portable_extract"
          mkdir -p "$appimage_extract" "$portable_extract"

          (
            cd "$appimage_extract"
            "$GITHUB_WORKSPACE/$appimage" --appimage-extract >/dev/null
          )

          appimage_root="$appimage_extract/squashfs-root"

          test -e "$appimage_root/AppRun"
          test -x "$appimage_root/usr/bin/Davenstein"
          test -s "$appimage_root/usr/bin/assets.pak"

          for legal_file in \
            LICENSE.md \
            LICENSE-MIT \
            LICENSE-APACHE \
            COPYRIGHT.md \
            THIRD_PARTY_ASSETS.md
          do
            test -f "$appimage_root/usr/share/doc/davenstein/$legal_file"
          done

          file "$appimage_root/usr/bin/Davenstein"
          file "$appimage_root/usr/bin/Davenstein" |
            grep -Eiq 'ELF 64-bit.*x86-64'

          tar -xzf "$portable" -C "$portable_extract"

          package_root=$(find "$portable_extract" \
            -mindepth 1 \
            -maxdepth 1 \
            -type d \
            -print \
            -quit)

          test -n "$package_root"

          for name in \
            Davenstein \
            assets.pak \
            README.md \
            LICENSE.md \
            LICENSE-MIT \
            LICENSE-APACHE \
            COPYRIGHT.md \
            THIRD_PARTY_ASSETS.md \
            davenstein.png \
            portable.flag \
            run-davenstein.sh
          do
            test -e "$package_root/$name"
          done

          test -x "$package_root/Davenstein"
          test -x "$package_root/run-davenstein.sh"
          test -s "$package_root/assets.pak"

          file "$package_root/Davenstein"
          file "$package_root/Davenstein" |
            grep -Eiq 'ELF 64-bit.*x86-64'

      - name: Stage Linux Release Packages
        run: |
          rm -rf target/release-artifacts/linux
          mkdir -p target/release-artifacts/linux
          cp target/appimage/Davenstein-*-x86_64.AppImage target/release-artifacts/linux/
          cp target/appimage/Davenstein-*-x86_64.AppImage.sha256 target/release-artifacts/linux/
          cp target/portable/Davenstein-*-linux-x86_64.tar.gz target/release-artifacts/linux/
          cp target/portable/Davenstein-*-linux-x86_64.tar.gz.sha256 target/release-artifacts/linux/

          # Publish the native Debian package beside the existing x86_64
          # AppImage and portable archive as part of the same Linux artifact.
          cp target/debian/Davenstein-*-linux-amd64.deb target/release-artifacts/linux/
          cp target/debian/Davenstein-*-linux-amd64.deb.sha256 target/release-artifacts/linux/

      - name: Upload Linux Packages
        uses: actions/upload-artifact@v7
        with:
          name: Davenstein-Linux-Packages
          path: target/release-artifacts/linux/*
          if-no-files-found: error

  # Build the RPM from a binary compiled natively on Rocky Linux 9 rather than
  # repackaging the Ubuntu binary used by the other Linux x86_64 artifacts.
  # This preserves an Enterprise Linux 9 runtime baseline for the RPM package.
  build-linux-rpm:
    name: Build Linux x86_64 RPM Package
    if: github.event_name == 'push' || inputs.build_target == 'all' || inputs.build_target == 'linux-x86_64'
    runs-on: ubuntu-latest
    container:
      image: rockylinux:9

    defaults:
      run:
        shell: bash

    steps:
      # Container jobs begin with only the packages supplied by Rocky Linux.
      # Install Git before checkout along with every native build and RPM tool.
      - name: Install Rocky Linux Build Dependencies
        run: |
          set -euxo pipefail

          dnf install -y \
            dnf-plugins-core \
            epel-release

          dnf config-manager --set-enabled crb

          dnf install -y \
            alsa-lib-devel \
            binutils \
            ca-certificates \
            cpio \
            curl-minimal \
            desktop-file-utils \
            file \
            findutils \
            gcc \
            gcc-c++ \
            git \
            gzip \
            hicolor-icon-theme \
            libX11-devel \
            libXcursor-devel \
            libXi-devel \
            libXrandr-devel \
            libxkbcommon-devel \
            make \
            pkgconf-pkg-config \
            redhat-rpm-config \
            rpm-build \
            rpmlint \
            systemd-devel \
            tar \
            wayland-devel \
            which

      - name: Check Out Source
        uses: actions/checkout@v7

      - name: Install Rust
        run: |
          set -euxo pipefail

          curl \
            --proto "=https" \
            --tlsv1.2 \
            -sSf \
            https://sh.rustup.rs |
            sh -s -- \
              -y \
              --profile minimal \
              --default-toolchain stable

          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

          . "$HOME/.cargo/env"

          rustc --version
          cargo --version
          rpmbuild --version
          rpmlint --version

      - name: Resolve Release Version
        id: version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            version="${GITHUB_REF_NAME#v}"
          else
            version=$(
              sed -nE \
                's/^version = "([^"]+)"/\1/p' \
                Cargo.toml |
                head -n 1
            )
          fi

          test -n "$version"

          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "Building Linux RPM version $version"

      - name: Build Davenstein for Rocky Linux
        run: |
          cargo build \
            --release \
            --locked \
            --bin Davenstein

      - name: Build Rocky Linux Assets
        run: |
          rustc \
            --edition=2024 \
            -O \
            src/pak_builder.rs \
            -o target/release/pak_builder

          target/release/pak_builder \
            --root assets \
            --out target/release/assets.pak

      - name: Build RPM Package
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: packaging/rpm/build-package.sh

      # Validate the RPM first as an archive, then as an installed package, and
      # finally prove that removal leaves no Davenstein-owned paths behind.
      - name: Validate RPM Package
        run: |
          set -euxo pipefail

          release_version="${{ steps.version.outputs.version }}"
          rpm_file="target/rpm/Davenstein-${release_version}-linux-x86_64.rpm"
          checksum="${rpm_file}.sha256"

          test -f "$rpm_file"
          test -f "$checksum"

          (
            cd target/rpm
            sha256sum --check "$(basename "$checksum")"
          )

          test "$(
            rpm -qp \
              --queryformat "%{NAME}" \
              "$rpm_file"
          )" = "davenstein"

          test "$(
            rpm -qp \
              --queryformat "%{VERSION}" \
              "$rpm_file"
          )" = "${release_version%%-*}"

          test "$(
            rpm -qp \
              --queryformat "%{ARCH}" \
              "$rpm_file"
          )" = "x86_64"

          echo "=== RPM metadata ==="

          rpm -qp \
            --queryformat \
            "Name: %{NAME}\nVersion: %{VERSION}\nRelease: %{RELEASE}\nArchitecture: %{ARCH}\nLicense: %{LICENSE}\n" \
            "$rpm_file"

          echo "=== RPM dependencies ==="

          rpm -qpR "$rpm_file" |
            sort

          echo "=== rpmlint ==="

          set +e

          rpmlint "$rpm_file" 2>&1 |
            tee target/rpm/rpmlint.txt

          rpmlint_status=${PIPESTATUS[0]}

          set -e

          printf "rpmlint exit status: %s\n" "$rpmlint_status"

          # Rocky Linux 9's older rpmlint database produces several accepted
          # warnings, but genuine package errors must still fail the workflow.
          if ! grep -Eq '(^|[^0-9])0 errors,' target/rpm/rpmlint.txt
          then
            echo "rpmlint reported one or more RPM package errors" >&2
            exit 1
          fi

          extract_dir="$RUNNER_TEMP/davenstein-rpm-extract"

          rm -rf "$extract_dir"
          mkdir -p "$extract_dir"

          (
            cd "$extract_dir"

            rpm2cpio "$GITHUB_WORKSPACE/$rpm_file" |
              cpio -idm
          )

          test -x "$extract_dir/usr/bin/Davenstein"
          test -x "$extract_dir/usr/libexec/davenstein/Davenstein"
          test -s "$extract_dir/usr/libexec/davenstein/assets.pak"
          test ! -e "$extract_dir/usr/libexec/davenstein/portable.flag"

          test -f \
            "$extract_dir/usr/share/applications/davenstein.desktop"

          test -f \
            "$extract_dir/usr/share/icons/hicolor/256x256/apps/davenstein.png"

          test -f \
            "$extract_dir/usr/share/doc/davenstein/README.md"

          test -f \
            "$extract_dir/usr/share/licenses/davenstein/LICENSE.md"

          test -f \
            "$extract_dir/usr/share/licenses/davenstein/LICENSE-MIT"

          test -f \
            "$extract_dir/usr/share/licenses/davenstein/LICENSE-APACHE"

          test -f \
            "$extract_dir/usr/share/licenses/davenstein/COPYRIGHT.md"

          test -f \
            "$extract_dir/usr/share/licenses/davenstein/THIRD_PARTY_ASSETS.md"

          test -f \
            "$extract_dir/usr/share/man/man6/Davenstein.6.gz"

          grep -Fx \
            'exec /usr/libexec/davenstein/Davenstein "$@"' \
            "$extract_dir/usr/bin/Davenstein"

          grep -Fx \
            'Exec=/usr/bin/Davenstein' \
            "$extract_dir/usr/share/applications/davenstein.desktop"

          sh -n "$extract_dir/usr/bin/Davenstein"

          gzip -t \
            "$extract_dir/usr/share/man/man6/Davenstein.6.gz"

          file "$extract_dir/usr/libexec/davenstein/Davenstein" |
            grep -Eiq 'ELF 64-bit.*x86-64.*stripped'

          if ldd "$extract_dir/usr/libexec/davenstein/Davenstein" |
            grep -F "not found"
          then
            echo "Extracted RPM executable has unresolved libraries" >&2
            exit 1
          fi

          rpm -qpl "$rpm_file" |
            grep -Fx "/usr/share/doc/davenstein"

          rpm -qpl "$rpm_file" |
            grep -Fx "/usr/share/licenses/davenstein"

          dnf install -y "$GITHUB_WORKSPACE/$rpm_file"

          rpm -V davenstein

          test -x /usr/bin/Davenstein
          test -x /usr/libexec/davenstein/Davenstein
          test -s /usr/libexec/davenstein/assets.pak
          test ! -e /usr/libexec/davenstein/portable.flag
          test -d /usr/share/doc/davenstein
          test -d /usr/share/licenses/davenstein

          if ldd /usr/libexec/davenstein/Davenstein |
            grep -F "not found"
          then
            echo "Installed RPM executable has unresolved libraries" >&2
            exit 1
          fi

          dnf remove -y davenstein

          for installed_path in \
            /usr/bin/Davenstein \
            /usr/libexec/davenstein \
            /usr/share/applications/davenstein.desktop \
            /usr/share/icons/hicolor/256x256/apps/davenstein.png \
            /usr/share/doc/davenstein \
            /usr/share/licenses/davenstein \
            /usr/share/man/man6/Davenstein.6.gz
          do
            test ! -e "$installed_path"
          done

          if rpm -q davenstein >/dev/null 2>&1
          then
            echo "Davenstein remains registered after RPM removal" >&2
            exit 1
          fi

      - name: Stage Linux RPM Release Package
        run: |
          rm -rf target/release-artifacts/linux-rpm
          mkdir -p target/release-artifacts/linux-rpm

          cp \
            target/rpm/Davenstein-*-linux-x86_64.rpm \
            target/release-artifacts/linux-rpm/

          cp \
            target/rpm/Davenstein-*-linux-x86_64.rpm.sha256 \
            target/release-artifacts/linux-rpm/

      - name: Upload Linux RPM Package
        uses: actions/upload-artifact@v7
        with:
          name: Davenstein-Linux-RPM-Packages
          path: target/release-artifacts/linux-rpm/*
          if-no-files-found: error

      # Retain the lint report for workflow inspection without publishing it as
      # a downloadable file on tagged GitHub releases.
      - name: Upload RPM Lint Report
        uses: actions/upload-artifact@v7
        with:
          name: RPM-Lint-Report
          path: target/rpm/rpmlint.txt
          if-no-files-found: error

  # Build Flatpak natively because flatpak-builder only supports host-compatible
  # architectures and the Flatpak Rust SDK supplies the compiler used inside
  # the isolated Freedesktop build environment
  #
  # The linux-x86_64 manual selection intentionally runs the existing Ubuntu
  # packages, Rocky Linux RPM package, and this Flatpak package in parallel
  build-linux-flatpak:
    name: Build Linux x86_64 Flatpak Package
    if: github.event_name == 'push' || inputs.build_target == 'all' || inputs.build_target == 'linux-x86_64'
    runs-on: ubuntu-24.04

    steps:
      - name: Check Out Source
        uses: actions/checkout@v7

      # Install only the host tools needed to construct and validate Flatpak
      # bundles because Rust itself comes from the Flatpak SDK extension
      - name: Install Flatpak Build Dependencies
        run: |
          set -euxo pipefail

          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            appstream \
            desktop-file-utils \
            elfutils \
            flatpak \
            flatpak-builder

      # Install the exact runtime family declared by the committed manifest
      # under the current runner account so the shared package builder can use
      # Flatpak's per-user runtime and repository state
      - name: Install Flatpak Runtime and SDK
        run: |
          set -euxo pipefail

          flatpak remote-add \
            --user \
            --if-not-exists \
            flathub \
            https://dl.flathub.org/repo/flathub.flatpakrepo

          flatpak install \
            --user \
            --noninteractive \
            -y \
            flathub \
            org.freedesktop.Platform//25.08 \
            org.freedesktop.Sdk//25.08 \
            org.freedesktop.Sdk.Extension.rust-stable//25.08

      - name: Resolve Release Version
        id: version
        shell: bash
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            version="${GITHUB_REF_NAME#v}"
          else
            version=$(sed -nE 's/^version = "([^"]+)"/\1/p' Cargo.toml | head -n 1)
          fi

          test -n "$version"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "Building Linux x86_64 Flatpak version $version"

      # Regenerate cargo-sources.json from Cargo.lock at build time so the
      # offline Flatpak build always matches the committed lockfile
      - name: Set Up Python for the Cargo Sources Generator
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install Cargo Sources Generator Dependencies
        run: pip install "aiohttp==3.14.2" "tomlkit==0.15.1" "PyYAML==6.0.3"

      # The shared builder validates metadata, performs the locked offline Rust
      # build, exports the stable application ref, and creates its checksum
      - name: Build Davenstein x86_64 Flatpak
        env:
          VERSION: ${{ steps.version.outputs.version }}
          FLATPAK_ARCH: x86_64
        run: packaging/flatpak/build-package.sh

      - name: Validate Linux x86_64 Flatpak
        shell: bash
        run: |
          set -euxo pipefail

          app_id="io.github.ophois47.davenstein"

          flatpak_file=$(find target/flatpak \
            -maxdepth 1 \
            -type f \
            -name 'Davenstein-*-linux-x86_64.flatpak' \
            -print \
            -quit)

          test -n "$flatpak_file"
          test -f "$flatpak_file.sha256"

          # Verify the basename-only checksum from the artifact directory
          (
            cd "$(dirname "$flatpak_file")"
            sha256sum --check "$(basename "$flatpak_file.sha256")"
          )

          # Install the exact single-file bundle that will be published rather
          # than testing only the temporary repository used during construction
          flatpak install \
            --user \
            --noninteractive \
            -y \
            "$flatpak_file"

          flatpak list \
            --user \
            --app \
            --columns=application,arch,branch |
            grep -Eq "^${app_id}[[:space:]]+x86_64[[:space:]]+stable$"

          # Confirm the application retained its deliberately narrow sandbox
          # permissions without network or host filesystem access
          permissions=$(flatpak info \
            --user \
            --show-permissions \
            "$app_id")

          printf '%s\n' "$permissions"

          printf '%s\n' "$permissions" | grep -Fq 'shared=ipc;'
          printf '%s\n' "$permissions" | grep -Eq '(^|[=;])x11;'
          printf '%s\n' "$permissions" | grep -Fq 'wayland'
          printf '%s\n' "$permissions" | grep -Fq 'pulseaudio'
          printf '%s\n' "$permissions" | grep -Eq '(^|[=;])fallback-x11;'
          printf '%s\n' "$permissions" | grep -Fq 'devices=dri;'

          if printf '%s\n' "$permissions" | grep -Eq 'network|filesystem'
          then
            echo "Flatpak received an unexpected broad sandbox permission" >&2
            exit 1
          fi

          # Inspect installed files without launching the graphical game because
          # GitHub-hosted runners do not provide a supported desktop test session
          flatpak run \
            --command=sh \
            "$app_id" \
            -c '
              test -x /app/bin/Davenstein
              test -s /app/bin/assets.pak
              test -f /app/share/applications/io.github.ophois47.davenstein.desktop
              test -f /app/share/icons/hicolor/256x256/apps/io.github.ophois47.davenstein.png
              test -f /app/share/metainfo/io.github.ophois47.davenstein.metainfo.xml
              test -f /app/share/doc/io.github.ophois47.davenstein/README.md
              test -f /app/share/licenses/io.github.ophois47.davenstein/LICENSE.md
              test -f /app/share/licenses/io.github.ophois47.davenstein/LICENSE-MIT
              test -f /app/share/licenses/io.github.ophois47.davenstein/LICENSE-APACHE
              test -f /app/share/licenses/io.github.ophois47.davenstein/COPYRIGHT.md
              test -f /app/share/licenses/io.github.ophois47.davenstein/THIRD_PARTY_ASSETS.md
            '

          flatpak uninstall \
            --user \
            --noninteractive \
            -y \
            "$app_id//stable"

      - name: Stage Linux x86_64 Flatpak Package
        run: |
          rm -rf target/release-artifacts/linux-flatpak
          mkdir -p target/release-artifacts/linux-flatpak

          cp \
            target/flatpak/Davenstein-*-linux-x86_64.flatpak \
            target/release-artifacts/linux-flatpak/

          cp \
            target/flatpak/Davenstein-*-linux-x86_64.flatpak.sha256 \
            target/release-artifacts/linux-flatpak/

      - name: Upload Linux x86_64 Flatpak Package
        uses: actions/upload-artifact@v7
        with:
          name: Davenstein-Linux-x86_64-Flatpak-Packages
          path: target/release-artifacts/linux-flatpak/*
          if-no-files-found: error

  build-linux-arm64:
    name: Build Linux ARM64 Portable Archive
    if: github.event_name == 'push' || inputs.build_target == 'all' || inputs.build_target == 'linux-arm64'
    runs-on: ubuntu-22.04

    steps:
      - name: Check Out Source
        uses: actions/checkout@v7

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Resolve Release Version
        id: version
        shell: bash
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            version="${GITHUB_REF_NAME#v}"
          else
            version=$(sed -nE 's/^version = "([^"]+)"/\1/p' Cargo.toml | head -n 1)
          fi

          test -n "$version"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "Building Linux ARM64 version $version"

      - name: Install Cross
        run: cargo install cross --version 0.2.5 --locked

      - name: Build Davenstein for Linux ARM64
        env:
          CARGO_BUILD_JOBS: 2
        run: |
          cross build \
            --release \
            --locked \
            --target aarch64-unknown-linux-gnu \
            --features software_render \
            --bin Davenstein

      - name: Build Asset Packer
        run: |
          mkdir -p target/release
          rustc --edition=2024 -O src/pak_builder.rs -o target/release/pak_builder

      - name: Build Assets
        run: |
          ./target/release/pak_builder \
            --root assets \
            --out target/release/assets.pak

      - name: Build Linux ARM64 Portable Archive
        env:
          VERSION: ${{ steps.version.outputs.version }}
          ARCH: aarch64
          BINARY_PATH: ${{ github.workspace }}/target/aarch64-unknown-linux-gnu/release/Davenstein
        run: packaging/linux/build-portable.sh

      - name: Validate Linux ARM64 Portable Archive
        shell: bash
        run: |
          archive=$(find target/portable \
            -maxdepth 1 \
            -type f \
            -name 'Davenstein-*-linux-aarch64.tar.gz' \
            -print \
            -quit)

          test -n "$archive"
          test -f "$archive.sha256"

          (
            cd target/portable
            sha256sum --check "$(basename "$archive.sha256")"
          )

          extract_dir="$RUNNER_TEMP/davenstein-linux-aarch64"

          rm -rf "$extract_dir"
          mkdir -p "$extract_dir"

          tar -xzf "$archive" -C "$extract_dir"

          package_root=$(find "$extract_dir" \
            -mindepth 1 \
            -maxdepth 1 \
            -type d \
            -print \
            -quit)

          test -n "$package_root"

          for name in \
            Davenstein \
            assets.pak \
            README.md \
            LICENSE.md \
            LICENSE-MIT \
            LICENSE-APACHE \
            COPYRIGHT.md \
            THIRD_PARTY_ASSETS.md \
            davenstein.png \
            portable.flag \
            run-davenstein.sh
          do
            test -e "$package_root/$name"
          done

          test -x "$package_root/Davenstein"
          test -x "$package_root/run-davenstein.sh"
          test -s "$package_root/assets.pak"

          file "$package_root/Davenstein"
          file "$package_root/Davenstein" |
            grep -Eiq 'ELF 64-bit.*(aarch64|ARM aarch64)'

      - name: Stage Linux ARM64 Release Packages
        run: |
          rm -rf target/release-artifacts/linux-arm64
          mkdir -p target/release-artifacts/linux-arm64
          cp target/portable/Davenstein-*-linux-aarch64.tar.gz target/release-artifacts/linux-arm64/
          cp target/portable/Davenstein-*-linux-aarch64.tar.gz.sha256 target/release-artifacts/linux-arm64/

      - name: Upload Linux ARM64 Packages
        uses: actions/upload-artifact@v7
        with:
          name: Davenstein-Linux-ARM64-Packages
          path: target/release-artifacts/linux-arm64/*
          if-no-files-found: error


  # Cross-compile on an x86_64 GitHub runner because hosted ARMv7 runners are unavailable
  # Use the gnueabihf target so the release follows the ARMHF hard-float ABI
  # Keep ARMv7 as a portable archive until an ARMv7 AppImage path is validated
  build-linux-armv7:
    name: Build Linux ARMv7 Portable Archive
    if: github.event_name == 'push' || inputs.build_target == 'all' || inputs.build_target == 'linux-armv7'
    runs-on: ubuntu-22.04

    steps:
      - name: Check Out Source
        uses: actions/checkout@v7

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Resolve Release Version
        id: version
        shell: bash
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            version="${GITHUB_REF_NAME#v}"
          else
            version=$(sed -nE 's/^version = "([^"]+)"/\1/p' Cargo.toml | head -n 1)
          fi

          test -n "$version"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "Building Linux ARMv7 version $version"

      - name: Install Cross
        run: cargo install cross --version 0.2.5 --locked

      - name: Install Validation Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            binutils \
            file

      - name: Build Davenstein for Linux ARMv7
        env:
          CARGO_BUILD_JOBS: 2
        run: |
          cross build \
            --release \
            --locked \
            --target armv7-unknown-linux-gnueabihf \
            --features software_render \
            --bin Davenstein

      - name: Validate Linux ARMv7 Executable
        shell: bash
        run: |
          # Verify the ELF header and ARM attributes instead of trusting only the Rust target name
          binary=target/armv7-unknown-linux-gnueabihf/release/Davenstein

          test -x "$binary"

          file "$binary"
          file "$binary" |
            grep -Eq 'ELF 32-bit.*ARM.*EABI5'

          readelf -h "$binary" |
            tee "$RUNNER_TEMP/davenstein-armv7-elf-header.txt"

          grep -Eq \
            'Class:[[:space:]]+ELF32' \
            "$RUNNER_TEMP/davenstein-armv7-elf-header.txt"

          grep -Eq \
            'Machine:[[:space:]]+ARM' \
            "$RUNNER_TEMP/davenstein-armv7-elf-header.txt"

          grep -Eq \
            'Flags:.*Version5 EABI.*hard-float ABI' \
            "$RUNNER_TEMP/davenstein-armv7-elf-header.txt"

          readelf -A "$binary" |
            tee "$RUNNER_TEMP/davenstein-armv7-attributes.txt"

          grep -Eq \
            'Tag_CPU_arch:[[:space:]]+v7' \
            "$RUNNER_TEMP/davenstein-armv7-attributes.txt"

          grep -Eq \
            'Tag_ABI_VFP_args:[[:space:]]+VFP registers' \
            "$RUNNER_TEMP/davenstein-armv7-attributes.txt"

      - name: Build Asset Packer
        run: |
          mkdir -p target/release
          rustc --edition=2024 -O \
            src/pak_builder.rs \
            -o target/release/pak_builder

      - name: Build Assets
        run: |
          ./target/release/pak_builder \
            --root assets \
            --out target/release/assets.pak

      - name: Build Linux ARMv7 Portable Archive
        env:
          VERSION: ${{ steps.version.outputs.version }}
          ARCH: armv7
          BINARY_PATH: ${{ github.workspace }}/target/armv7-unknown-linux-gnueabihf/release/Davenstein
        run: packaging/linux/build-portable.sh

      - name: Validate Linux ARMv7 Portable Archive
        shell: bash
        run: |
          archive=$(find target/portable \
            -maxdepth 1 \
            -type f \
            -name 'Davenstein-*-linux-armv7.tar.gz' \
            -print \
            -quit)

          test -n "$archive"
          test -f "$archive.sha256"

          (
            cd target/portable
            sha256sum --check "$(basename "$archive.sha256")"
          )

          extract_dir="$RUNNER_TEMP/davenstein-linux-armv7"
          rm -rf "$extract_dir"
          mkdir -p "$extract_dir"

          tar -xzf "$archive" -C "$extract_dir"

          package_root=$(find "$extract_dir" \
            -mindepth 1 \
            -maxdepth 1 \
            -type d \
            -print \
            -quit)

          test -n "$package_root"

          for name in \
            Davenstein \
            assets.pak \
            README.md \
            LICENSE.md \
            LICENSE-MIT \
            LICENSE-APACHE \
            COPYRIGHT.md \
            THIRD_PARTY_ASSETS.md \
            davenstein.png \
            portable.flag \
            run-davenstein.sh
          do
            test -e "$package_root/$name"
          done

          test -x "$package_root/Davenstein"
          test -x "$package_root/run-davenstein.sh"
          test -s "$package_root/assets.pak"

          # Revalidate the extracted executable so the uploaded archive retains the target ABI
          file "$package_root/Davenstein"
          file "$package_root/Davenstein" |
            grep -Eq 'ELF 32-bit.*ARM.*EABI5'

          readelf -h "$package_root/Davenstein" |
            grep -Eq 'Flags:.*Version5 EABI.*hard-float ABI'

      - name: Stage Linux ARMv7 Release Packages
        run: |
          rm -rf target/release-artifacts/linux-armv7
          mkdir -p target/release-artifacts/linux-armv7

          cp \
            target/portable/Davenstein-*-linux-armv7.tar.gz \
            target/release-artifacts/linux-armv7/

          cp \
            target/portable/Davenstein-*-linux-armv7.tar.gz.sha256 \
            target/release-artifacts/linux-armv7/

      - name: Upload Linux ARMv7 Packages
        uses: actions/upload-artifact@v7
        with:
          name: Davenstein-Linux-ARMv7-Packages
          path: target/release-artifacts/linux-armv7/*
          if-no-files-found: error

  # Build natively because linuxdeploy and appimagetool must run on ARM64
  # Keep this separate from the cross-compiled archive so both proven paths stay isolated
  # The linux-arm64 manual selection intentionally runs both ARM64 package jobs
  build-linux-arm64-appimage:
    name: Build Linux ARM64 AppImage
    if: github.event_name == 'push' || inputs.build_target == 'all' || inputs.build_target == 'linux-arm64'
    runs-on: ubuntu-22.04-arm

    steps:
      - name: Check Out Source
        uses: actions/checkout@v7

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            curl \
            file \
            libasound2-dev \
            libudev-dev \
            libwayland-dev \
            libx11-dev \
            libxcursor-dev \
            libxi-dev \
            libxkbcommon-dev \
            libxrandr-dev \
            pkg-config

      - name: Resolve Release Version
        id: version
        shell: bash
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            version="${GITHUB_REF_NAME#v}"
          else
            version=$(sed -nE 's/^version = "([^"]+)"/\1/p' Cargo.toml | head -n 1)
          fi

          test -n "$version"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "Building Linux ARM64 AppImage version $version"

      # The generalized script builds natively for the runner architecture
      # ARCH selects the matching linuxdeploy tool, checksum, cleanup, and output name
      - name: Build Davenstein ARM64 AppImage
        env:
          VERSION: ${{ steps.version.outputs.version }}
          ARCH: aarch64
        run: packaging/linux/build-appimage.sh

      - name: Validate Linux ARM64 AppImage
        shell: bash
        run: |
          appimage=$(find target/appimage \
            -maxdepth 1 \
            -type f \
            -name 'Davenstein-*-aarch64.AppImage' \
            -print \
            -quit)

          test -n "$appimage"
          test -f "$appimage.sha256"

          # Validate the AppImage runtime itself before inspecting its contents
          file "$appimage"
          file "$appimage" | grep -Eiq 'aarch64|arm64'

          (
            cd target/appimage
            sha256sum --check "$(basename "$appimage.sha256")"
          )

          # Extract on the native runner because x86_64 hosts cannot execute this runtime
          extract_dir="$RUNNER_TEMP/davenstein-linux-arm64-appimage"
          rm -rf "$extract_dir"
          mkdir -p "$extract_dir"

          (
            cd "$extract_dir"
            "$GITHUB_WORKSPACE/$appimage" --appimage-extract >/dev/null
          )

          # Require the launcher, game executable, and complete asset package
          test -e "$extract_dir/squashfs-root/AppRun"
          test -x "$extract_dir/squashfs-root/usr/bin/Davenstein"
          test -s "$extract_dir/squashfs-root/usr/bin/assets.pak"

          for legal_file in \
            LICENSE.md \
            LICENSE-MIT \
            LICENSE-APACHE \
            COPYRIGHT.md \
            THIRD_PARTY_ASSETS.md
          do
            test -f \
              "$extract_dir/squashfs-root/usr/share/doc/davenstein/$legal_file"
          done

          # Confirm the packaged game binary matches the ARM64 AppImage runtime
          file "$extract_dir/squashfs-root/usr/bin/Davenstein"
          file "$extract_dir/squashfs-root/usr/bin/Davenstein" |
            grep -Eiq 'aarch64|arm64'

      - name: Stage Linux ARM64 AppImage
        run: |
          rm -rf target/release-artifacts/linux-arm64-appimage
          mkdir -p target/release-artifacts/linux-arm64-appimage
          cp \
            target/appimage/Davenstein-*-aarch64.AppImage \
            target/release-artifacts/linux-arm64-appimage/
          cp \
            target/appimage/Davenstein-*-aarch64.AppImage.sha256 \
            target/release-artifacts/linux-arm64-appimage/

      - name: Upload Linux ARM64 AppImage
        uses: actions/upload-artifact@v7
        with:
          name: Davenstein-Linux-ARM64-AppImage
          path: target/release-artifacts/linux-arm64-appimage/*
          if-no-files-found: error

  # Build the ARM64 Flatpak on a native runner because Flatpak requires a
  # host-compatible architecture just like the existing ARM64 AppImage path
  #
  # The linux-arm64 manual selection intentionally runs the portable archive,
  # AppImage, and Flatpak package jobs together
  build-linux-arm64-flatpak:
    name: Build Linux ARM64 Flatpak Package
    if: github.event_name == 'push' || inputs.build_target == 'all' || inputs.build_target == 'linux-arm64'
    runs-on: ubuntu-24.04-arm

    steps:
      - name: Check Out Source
        uses: actions/checkout@v7

      # Install only the host tools needed to construct and validate Flatpak
      # bundles because Rust itself comes from the Flatpak SDK extension
      - name: Install Flatpak Build Dependencies
        run: |
          set -euxo pipefail

          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            appstream \
            desktop-file-utils \
            elfutils \
            flatpak \
            flatpak-builder

      # Install the exact runtime family declared by the committed manifest
      # under the current runner account so the shared package builder can use
      # Flatpak's per-user runtime and repository state
      - name: Install Flatpak Runtime and SDK
        run: |
          set -euxo pipefail

          flatpak remote-add \
            --user \
            --if-not-exists \
            flathub \
            https://dl.flathub.org/repo/flathub.flatpakrepo

          flatpak install \
            --user \
            --noninteractive \
            -y \
            flathub \
            org.freedesktop.Platform//25.08 \
            org.freedesktop.Sdk//25.08 \
            org.freedesktop.Sdk.Extension.rust-stable//25.08

      - name: Resolve Release Version
        id: version
        shell: bash
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            version="${GITHUB_REF_NAME#v}"
          else
            version=$(sed -nE 's/^version = "([^"]+)"/\1/p' Cargo.toml | head -n 1)
          fi

          test -n "$version"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "Building Linux ARM64 Flatpak version $version"

      # Regenerate cargo-sources.json from Cargo.lock at build time so the
      # offline Flatpak build always matches the committed lockfile
      - name: Set Up Python for the Cargo Sources Generator
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install Cargo Sources Generator Dependencies
        run: pip install "aiohttp==3.14.2" "tomlkit==0.15.1" "PyYAML==6.0.3"

      # The shared builder validates metadata, performs the locked offline Rust
      # build, exports the stable application ref, and creates its checksum
      - name: Build Davenstein ARM64 Flatpak
        env:
          VERSION: ${{ steps.version.outputs.version }}
          FLATPAK_ARCH: aarch64
        run: packaging/flatpak/build-package.sh

      - name: Validate Linux ARM64 Flatpak
        shell: bash
        run: |
          set -euxo pipefail

          app_id="io.github.ophois47.davenstein"

          flatpak_file=$(find target/flatpak \
            -maxdepth 1 \
            -type f \
            -name 'Davenstein-*-linux-aarch64.flatpak' \
            -print \
            -quit)

          test -n "$flatpak_file"
          test -f "$flatpak_file.sha256"

          # Verify the basename-only checksum from the artifact directory
          (
            cd "$(dirname "$flatpak_file")"
            sha256sum --check "$(basename "$flatpak_file.sha256")"
          )

          # Install the exact single-file bundle that will be published rather
          # than testing only the temporary repository used during construction
          flatpak install \
            --user \
            --noninteractive \
            -y \
            "$flatpak_file"

          flatpak list \
            --user \
            --app \
            --columns=application,arch,branch |
            grep -Eq "^${app_id}[[:space:]]+aarch64[[:space:]]+stable$"

          # Confirm the application retained its deliberately narrow sandbox
          # permissions without network or host filesystem access
          permissions=$(flatpak info \
            --user \
            --show-permissions \
            "$app_id")

          printf '%s\n' "$permissions"

          printf '%s\n' "$permissions" | grep -Fq 'shared=ipc;'
          printf '%s\n' "$permissions" | grep -Eq '(^|[=;])x11;'
          printf '%s\n' "$permissions" | grep -Fq 'wayland'
          printf '%s\n' "$permissions" | grep -Fq 'pulseaudio'
          printf '%s\n' "$permissions" | grep -Eq '(^|[=;])fallback-x11;'
          printf '%s\n' "$permissions" | grep -Fq 'devices=dri;'

          if printf '%s\n' "$permissions" | grep -Eq 'network|filesystem'
          then
            echo "Flatpak received an unexpected broad sandbox permission" >&2
            exit 1
          fi

          # Inspect installed files without launching the graphical game because
          # GitHub-hosted runners do not provide a supported desktop test session
          flatpak run \
            --command=sh \
            "$app_id" \
            -c '
              test -x /app/bin/Davenstein
              test -s /app/bin/assets.pak
              test -f /app/share/applications/io.github.ophois47.davenstein.desktop
              test -f /app/share/icons/hicolor/256x256/apps/io.github.ophois47.davenstein.png
              test -f /app/share/metainfo/io.github.ophois47.davenstein.metainfo.xml
              test -f /app/share/doc/io.github.ophois47.davenstein/README.md
              test -f /app/share/licenses/io.github.ophois47.davenstein/LICENSE.md
              test -f /app/share/licenses/io.github.ophois47.davenstein/LICENSE-MIT
              test -f /app/share/licenses/io.github.ophois47.davenstein/LICENSE-APACHE
              test -f /app/share/licenses/io.github.ophois47.davenstein/COPYRIGHT.md
              test -f /app/share/licenses/io.github.ophois47.davenstein/THIRD_PARTY_ASSETS.md
            '

          flatpak uninstall \
            --user \
            --noninteractive \
            -y \
            "$app_id//stable"

      - name: Stage Linux ARM64 Flatpak Package
        run: |
          rm -rf target/release-artifacts/linux-arm64-flatpak
          mkdir -p target/release-artifacts/linux-arm64-flatpak

          cp \
            target/flatpak/Davenstein-*-linux-aarch64.flatpak \
            target/release-artifacts/linux-arm64-flatpak/

          cp \
            target/flatpak/Davenstein-*-linux-aarch64.flatpak.sha256 \
            target/release-artifacts/linux-arm64-flatpak/

      - name: Upload Linux ARM64 Flatpak Package
        uses: actions/upload-artifact@v7
        with:
          name: Davenstein-Linux-ARM64-Flatpak-Packages
          path: target/release-artifacts/linux-arm64-flatpak/*
          if-no-files-found: error

  build-freebsd:
    name: Build FreeBSD x86_64 Packages
    if: github.event_name == 'push' || inputs.build_target == 'all' || inputs.build_target == 'freebsd-x86_64'
    runs-on: ubuntu-22.04

    steps:
      - name: Check Out Source
        uses: actions/checkout@v7

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Resolve Release Version
        id: version
        shell: bash
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            version="${GITHUB_REF_NAME#v}"
          else
            version=$(sed -nE 's/^version = "([^"]+)"/\1/p' Cargo.toml | head -n 1)
          fi

          test -n "$version"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "Building FreeBSD x86_64 version $version"

      - name: Install Cross
        run: cargo install cross --version 0.2.5 --locked

      - name: Install FreeBSD Validation Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            binutils \
            file

      - name: Build Davenstein for FreeBSD x86_64
        env:
          CARGO_BUILD_JOBS: 2
        run: |
          cross build \
            --release \
            --locked \
            --target x86_64-unknown-freebsd \
            --bin Davenstein

      - name: Validate and Strip FreeBSD Executable
        shell: bash
        run: |
          binary=target/x86_64-unknown-freebsd/release/Davenstein
          stripped=target/freebsd-stripped/Davenstein

          test -x "$binary"

          file "$binary"
          file "$binary" |
            grep -Eq 'ELF 64-bit.*x86-64.*FreeBSD'

          readelf -h "$binary" |
            tee "$RUNNER_TEMP/davenstein-freebsd-elf-header.txt"

          grep -Eq \
            'Class:[[:space:]]+ELF64' \
            "$RUNNER_TEMP/davenstein-freebsd-elf-header.txt"

          grep -Eq \
            'OS/ABI:[[:space:]]+UNIX - FreeBSD' \
            "$RUNNER_TEMP/davenstein-freebsd-elf-header.txt"

          grep -Eq \
            'Type:[[:space:]]+DYN' \
            "$RUNNER_TEMP/davenstein-freebsd-elf-header.txt"

          grep -Eq \
            'Machine:[[:space:]]+Advanced Micro Devices X86-64' \
            "$RUNNER_TEMP/davenstein-freebsd-elf-header.txt"

          readelf -l "$binary" |
            tee "$RUNNER_TEMP/davenstein-freebsd-program-headers.txt"

          grep -Fq \
            '[Requesting program interpreter: /libexec/ld-elf.so.1]' \
            "$RUNNER_TEMP/davenstein-freebsd-program-headers.txt"

          stack_header=$(
            readelf -W -l "$binary" |
              grep GNU_STACK
          )

          printf '%s\n' "$stack_header"

          printf '%s\n' "$stack_header" |
            grep -Eq '[[:space:]]RW[[:space:]]'

          if printf '%s\n' "$stack_header" | grep -q 'RWE'; then
            echo "FreeBSD executable unexpectedly requests an executable stack" >&2
            exit 1
          fi

          if readelf -d "$binary" |
              grep -Eq 'TEXTREL|FLAGS.*TEXTREL'
          then
            echo "FreeBSD executable unexpectedly contains text relocations" >&2
            exit 1
          fi

          readelf -d "$binary" |
            tee "$RUNNER_TEMP/davenstein-freebsd-dynamic-section.txt"

          grep -Fq \
            'Shared library: [libwayland-client.so.0]' \
            "$RUNNER_TEMP/davenstein-freebsd-dynamic-section.txt"

          grep -Fq \
            'Shared library: [libasound.so.2]' \
            "$RUNNER_TEMP/davenstein-freebsd-dynamic-section.txt"

          mkdir -p "$(dirname "$stripped")"
          install -m 755 "$binary" "$stripped"

          # Use the target-aware strip utility supplied by the same FreeBSD
          # cross image that provides the build sysroot.
          docker run --rm \
            -v "$PWD:/work" \
            --entrypoint /usr/local/bin/x86_64-unknown-freebsd13-strip \
            ghcr.io/cross-rs/x86_64-unknown-freebsd:main \
            /work/"$stripped"

          test -x "$stripped"

          file "$stripped"
          file "$stripped" |
            grep -Eq 'ELF 64-bit.*x86-64.*FreeBSD.*stripped'

          readelf -l "$stripped" |
            grep -Fq \
              '[Requesting program interpreter: /libexec/ld-elf.so.1]'

      - name: Build Asset Packer
        run: |
          mkdir -p target/release

          rustc \
            --edition=2024 \
            -O \
            src/pak_builder.rs \
            -o target/release/pak_builder

      - name: Build Assets
        run: |
          ./target/release/pak_builder \
            --root assets \
            --out target/release/assets.pak

      - name: Build FreeBSD Portable Archive
        env:
          VERSION: ${{ steps.version.outputs.version }}
          ARCH: x86_64
          BINARY_PATH: ${{ github.workspace }}/target/freebsd-stripped/Davenstein
          ASSETS_PATH: ${{ github.workspace }}/target/release/assets.pak
        run: packaging/freebsd/build-portable.sh

      - name: Validate FreeBSD Portable Archive
        shell: bash
        run: |
          version="${{ steps.version.outputs.version }}"
          archive="target/portable/Davenstein-${version}-freebsd-x86_64.tar.gz"
          checksum="${archive}.sha256"
          extract_dir="$RUNNER_TEMP/davenstein-freebsd-portable"
          package_root="$extract_dir/Davenstein-${version}-freebsd-x86_64"

          test -f "$archive"
          test -f "$checksum"

          (
            cd target/portable
            sha256sum --check "$(basename "$checksum")"
          )

          rm -rf "$extract_dir"
          mkdir -p "$extract_dir"

          tar -xzf "$archive" -C "$extract_dir"

          for name in \
            Davenstein \
            assets.pak \
            README.md \
            LICENSE.md \
            LICENSE-MIT \
            LICENSE-APACHE \
            COPYRIGHT.md \
            THIRD_PARTY_ASSETS.md \
            davenstein.png \
            portable.flag \
            run-davenstein.sh
          do
            test -e "$package_root/$name"
          done

          test -x "$package_root/Davenstein"
          test -x "$package_root/run-davenstein.sh"
          test -s "$package_root/assets.pak"

          file "$package_root/Davenstein"
          file "$package_root/Davenstein" |
            grep -Eq 'ELF 64-bit.*x86-64.*FreeBSD.*stripped'

          readelf -h "$package_root/Davenstein" |
            grep -Eq 'OS/ABI:[[:space:]]+UNIX - FreeBSD'

          readelf -l "$package_root/Davenstein" |
            grep -Fq \
              '[Requesting program interpreter: /libexec/ld-elf.so.1]'

          stack_header=$(
            readelf -W -l "$package_root/Davenstein" |
              grep GNU_STACK
          )

          printf '%s\n' "$stack_header" |
            grep -Eq '[[:space:]]RW[[:space:]]'

          if printf '%s\n' "$stack_header" | grep -q 'RWE'; then
            echo "Packaged FreeBSD executable requests an executable stack" >&2
            exit 1
          fi

          if readelf -d "$package_root/Davenstein" |
              grep -Eq 'TEXTREL|FLAGS.*TEXTREL'
          then
            echo "Packaged FreeBSD executable contains text relocations" >&2
            exit 1
          fi

      - name: Start FreeBSD 14.4 VM
        uses: vmactions/freebsd-vm@v1.4.9
        with:
          release: "14.4"
          sync: nfs

      - name: Prepare FreeBSD Package Repository
        shell: freebsd {0}
        run: |
          freebsd-version -ku
          uname -a

          env ASSUME_ALWAYS_YES=yes pkg bootstrap -f
          pkg update -f

          package_abi=$(pkg config ABI)
          printf 'FreeBSD package ABI: %s\n' "$package_abi"

          test "$package_abi" = "FreeBSD:14:amd64"

      - name: Build Native FreeBSD Package
        shell: freebsd {0}
        run: |
          VERSION="${{ steps.version.outputs.version }}" \
          ARCH=x86_64 \
          BINARY_PATH="$PWD/target/freebsd-stripped/Davenstein" \
          ASSETS_PATH="$PWD/target/release/assets.pak" \
          packaging/freebsd/build-package.sh

      - name: Validate Native FreeBSD Package
        shell: freebsd {0}
        run: |
          version="${{ steps.version.outputs.version }}"
          package="target/freebsd/Davenstein-${version}-freebsd-x86_64.pkg"
          checksum="${package}.sha256"

          test -f "$package"
          test -f "$checksum"

          expected_hash=$(awk 'NR == 1 { print $1 }' "$checksum")
          actual_hash=$(sha256 -q "$package")

          test -n "$expected_hash"
          test "$actual_hash" = "$expected_hash"

          pkg query \
            -F "$package" \
            '%n|%v|%o|%p|%q' |
            tee /tmp/davenstein-package-metadata.txt

          grep -Fq \
            "davenstein|${version}|games/davenstein|/usr/local|FreeBSD:14:amd64" \
            /tmp/davenstein-package-metadata.txt

          tar -tf "$package" |
            tee /tmp/davenstein-package-contents.txt

          # Confirm that the finished package retained exactly the direct
          # runtime dependencies declared by the native package builder.
          pkg query \
            -F "$package" \
            '%dn' |
            LC_ALL=C sort \
            > /tmp/davenstein-package-dependencies.txt

          cat > /tmp/davenstein-expected-dependencies.txt <<'DEPENDENCIES'
          alsa-lib
          libX11
          libXcursor
          libXi
          libXrandr
          libudev-devd
          libxkbcommon
          wayland
          DEPENDENCIES

          diff -u \
            /tmp/davenstein-expected-dependencies.txt \
            /tmp/davenstein-package-dependencies.txt

          # pkg add installs a local archive but does not fetch missing
          # dependencies from the remote repository. Install the declared
          # dependencies first, then register and extract the local package.
          pkg install -y \
            alsa-lib \
            libX11 \
            libXcursor \
            libXi \
            libXrandr \
            libudev-devd \
            libxkbcommon \
            wayland

          pkg add "$package"

          pkg info davenstein
          pkg info -d davenstein
          pkg info -l davenstein

          test -x /usr/local/bin/Davenstein
          test -x /usr/local/libexec/davenstein/Davenstein
          test -s /usr/local/libexec/davenstein/assets.pak
          test -f /usr/local/share/applications/davenstein.desktop
          test -f /usr/local/share/doc/davenstein/README.md

          for legal_file in \
            LICENSE.md \
            LICENSE-MIT \
            LICENSE-APACHE \
            COPYRIGHT.md \
            THIRD_PARTY_ASSETS.md
          do
            test -f "/usr/local/share/doc/davenstein/$legal_file"
          done

          test -f /usr/local/share/icons/hicolor/256x256/apps/davenstein.png
          test ! -e /usr/local/libexec/davenstein/portable.flag

          file /usr/local/libexec/davenstein/Davenstein
          file /usr/local/libexec/davenstein/Davenstein |
            grep -Eq 'ELF 64-bit.*x86-64.*FreeBSD.*stripped'

          pkg check -s davenstein
          pkg check -d davenstein

          pkg delete -y davenstein

          test ! -e /usr/local/bin/Davenstein
          test ! -e /usr/local/libexec/davenstein/Davenstein
          test ! -e /usr/local/libexec/davenstein/assets.pak
          test ! -e /usr/local/share/applications/davenstein.desktop
          test ! -e /usr/local/share/doc/davenstein/README.md

          for legal_file in \
            LICENSE.md \
            LICENSE-MIT \
            LICENSE-APACHE \
            COPYRIGHT.md \
            THIRD_PARTY_ASSETS.md
          do
            test ! -e "/usr/local/share/doc/davenstein/$legal_file"
          done

          test ! -e /usr/local/share/icons/hicolor/256x256/apps/davenstein.png

      - name: Stage FreeBSD Release Packages
        run: |
          version="${{ steps.version.outputs.version }}"

          rm -rf target/release-artifacts/freebsd
          mkdir -p target/release-artifacts/freebsd

          cp \
            "target/portable/Davenstein-${version}-freebsd-x86_64.tar.gz" \
            target/release-artifacts/freebsd/

          cp \
            "target/portable/Davenstein-${version}-freebsd-x86_64.tar.gz.sha256" \
            target/release-artifacts/freebsd/

          cp \
            "target/freebsd/Davenstein-${version}-freebsd-x86_64.pkg" \
            target/release-artifacts/freebsd/

          cp \
            "target/freebsd/Davenstein-${version}-freebsd-x86_64.pkg.sha256" \
            target/release-artifacts/freebsd/

      - name: Upload FreeBSD Packages
        uses: actions/upload-artifact@v7
        with:
          name: Davenstein-FreeBSD-x86_64-Packages
          path: target/release-artifacts/freebsd/*
          if-no-files-found: error

  build-macos:
    name: Build Apple Silicon macOS App
    if: github.event_name == 'push' || inputs.build_target == 'all' || inputs.build_target == 'macos-arm64' || inputs.build_target == 'macos-universal'
    runs-on: macos-15
    env:
      MACOSX_DEPLOYMENT_TARGET: "11.0"

    steps:
      - name: Check Out Source
        uses: actions/checkout@v7

      - name: Install Rust
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
          rustc --version
          cargo --version

      - name: Resolve Release Version
        id: version
        shell: bash
        run: |
          cargo_version=$(sed -nE 's/^version = "([^"]+)"/\1/p' Cargo.toml | head -n 1)

          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            release_version="${GITHUB_REF_NAME#v}"
          else
            release_version="$cargo_version"
          fi

          test -n "$cargo_version"
          test -n "$release_version"

          echo "cargo_version=$cargo_version" >> "$GITHUB_OUTPUT"
          echo "release_version=$release_version" >> "$GITHUB_OUTPUT"
          echo "Building Apple Silicon macOS version $release_version"

      - name: Build Davenstein for Apple Silicon
        run: cargo build --release --locked --bin Davenstein

      - name: Build Asset Packer
        run: |
          mkdir -p target/release
          rustc --edition=2024 -O \
            src/pak_builder.rs \
            -o target/release/pak_builder

      - name: Build Assets
        run: |
          ./target/release/pak_builder \
            --root assets \
            --out target/release/assets.pak

      - name: Build macOS Application Bundle
        env:
          VERSION: ${{ steps.version.outputs.release_version }}
          BUNDLE_VERSION: ${{ github.run_number }}
          ARCH: aarch64
          BINARY_PATH: ${{ github.workspace }}/target/release/Davenstein
          ASSETS_PATH: ${{ github.workspace }}/target/release/assets.pak
        run: packaging/macos/build-app.sh

      - name: Validate macOS Application Bundle
        run: |
          plutil -lint target/macos/Davenstein.app/Contents/Info.plist

          test "$(
            plutil -extract CFBundleIdentifier raw -o - \
              target/macos/Davenstein.app/Contents/Info.plist
          )" = "com.davidpetnick.davenstein"

          test "$(
            plutil -extract CFBundleIconFile raw -o - \
              target/macos/Davenstein.app/Contents/Info.plist
          )" = "Davenstein.icns"

          test -s \
            target/macos/Davenstein.app/Contents/Resources/Davenstein.icns

          file \
            target/macos/Davenstein.app/Contents/Resources/Davenstein.icns

          file target/macos/Davenstein.app/Contents/MacOS/Davenstein
          lipo -archs target/macos/Davenstein.app/Contents/MacOS/Davenstein |
            grep -qw arm64

          for legal_file in \
            LICENSE.md \
            LICENSE-MIT \
            LICENSE-APACHE \
            COPYRIGHT.md \
            THIRD_PARTY_ASSETS.md
          do
            test -f \
              "target/macos/Davenstein.app/Contents/Resources/Documentation/$legal_file"
          done

          (
            cd target/macos
            shasum -a 256 -c Davenstein-*-macos-aarch64.zip.sha256
          )

      - name: Stage macOS Release Packages
        run: |
          rm -rf target/release-artifacts/macos
          mkdir -p target/release-artifacts/macos
          cp target/macos/Davenstein-*-macos-aarch64.zip target/release-artifacts/macos/
          cp target/macos/Davenstein-*-macos-aarch64.zip.sha256 target/release-artifacts/macos/

      - name: Upload macOS Packages
        uses: actions/upload-artifact@v7
        with:
          name: Davenstein-macOS-Apple-Silicon-Packages
          path: target/release-artifacts/macos/*
          if-no-files-found: error


  build-macos-intel:
    name: Build Intel macOS Component
    if: github.event_name == 'push' || inputs.build_target == 'all' || inputs.build_target == 'macos-intel' || inputs.build_target == 'macos-universal'
    runs-on: macos-15-intel
    env:
      MACOSX_DEPLOYMENT_TARGET: "11.0"

    steps:
      - name: Check Out Source
        uses: actions/checkout@v7

      - name: Install Rust
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
          rustc --version
          cargo --version

      - name: Build Davenstein for Intel macOS
        run: cargo build --release --locked --bin Davenstein

      - name: Validate Intel macOS Executable
        run: |
          file target/release/Davenstein
          lipo -archs target/release/Davenstein |
            grep -qw x86_64

      - name: Stage Intel macOS Component
        run: |
          rm -rf target/macos-intel-component
          mkdir -p target/macos-intel-component
          cp \
            target/release/Davenstein \
            target/macos-intel-component/Davenstein-x86_64

      - name: Upload Intel macOS Component
        uses: actions/upload-artifact@v7
        with:
          name: macos-x86_64-component
          path: target/macos-intel-component/*
          if-no-files-found: error

  build-macos-universal:
    name: Build Universal macOS App
    if: github.event_name == 'push' || inputs.build_target == 'all' || inputs.build_target == 'macos-universal'
    needs:
      - build-macos
      - build-macos-intel
    runs-on: macos-15
    env:
      MACOSX_DEPLOYMENT_TARGET: "11.0"

    steps:
      - name: Check Out Source
        uses: actions/checkout@v7

      - name: Resolve Release Version
        id: version
        shell: bash
        run: |
          cargo_version=$(sed -nE 's/^version = "([^"]+)"/\1/p' Cargo.toml | head -n 1)

          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            release_version="${GITHUB_REF_NAME#v}"
          else
            release_version="$cargo_version"
          fi

          test -n "$cargo_version"
          test -n "$release_version"

          echo "cargo_version=$cargo_version" >> "$GITHUB_OUTPUT"
          echo "release_version=$release_version" >> "$GITHUB_OUTPUT"
          echo "Building Universal macOS version $release_version"

      - name: Download Apple Silicon macOS Package
        uses: actions/download-artifact@v8
        with:
          name: Davenstein-macOS-Apple-Silicon-Packages
          path: target/macos-arm64-package

      - name: Download Intel macOS Component
        uses: actions/download-artifact@v8
        with:
          name: macos-x86_64-component
          path: target/macos-intel-component

      - name: Create Universal macOS Executable
        shell: bash
        run: |
          rm -rf target/macos-universal-input target/macos-universal
          mkdir -p target/macos-universal-input target/macos-universal

          arm_zip=$(
            find target/macos-arm64-package \
              -maxdepth 1 \
              -type f \
              -name 'Davenstein-*-macos-aarch64.zip' \
              -print \
              -quit
          )

          test -n "$arm_zip"

          ditto \
            -x \
            -k \
            "$arm_zip" \
            target/macos-universal-input

          arm_binary=target/macos-universal-input/Davenstein.app/Contents/MacOS/Davenstein
          intel_binary=target/macos-intel-component/Davenstein-x86_64
          universal_binary=target/macos-universal/Davenstein

          test -f "$arm_binary"
          test -f "$intel_binary"

          lipo \
            -create \
            "$arm_binary" \
            "$intel_binary" \
            -output "$universal_binary"

          chmod 755 "$universal_binary"

          file "$universal_binary"
          lipo -archs "$universal_binary" |
            grep -qw arm64
          lipo -archs "$universal_binary" |
            grep -qw x86_64

      - name: Build Universal macOS Application Bundle
        env:
          VERSION: ${{ steps.version.outputs.release_version }}
          BUNDLE_VERSION: ${{ github.run_number }}
          ARCH: universal
          BINARY_PATH: ${{ github.workspace }}/target/macos-universal/Davenstein
          ASSETS_PATH: ${{ github.workspace }}/target/macos-universal-input/Davenstein.app/Contents/MacOS/assets.pak
        run: packaging/macos/build-app.sh

      - name: Validate Universal macOS Application Bundle
        run: |
          plutil -lint target/macos/Davenstein.app/Contents/Info.plist

          test "$(
            plutil -extract CFBundleIdentifier raw -o - \
              target/macos/Davenstein.app/Contents/Info.plist
          )" = "com.davidpetnick.davenstein"

          test "$(
            plutil -extract CFBundleIconFile raw -o - \
              target/macos/Davenstein.app/Contents/Info.plist
          )" = "Davenstein.icns"

          test -s \
            target/macos/Davenstein.app/Contents/Resources/Davenstein.icns

          file target/macos/Davenstein.app/Contents/MacOS/Davenstein

          lipo -archs target/macos/Davenstein.app/Contents/MacOS/Davenstein |
            grep -qw arm64
          lipo -archs target/macos/Davenstein.app/Contents/MacOS/Davenstein |
            grep -qw x86_64

          for legal_file in \
            LICENSE.md \
            LICENSE-MIT \
            LICENSE-APACHE \
            COPYRIGHT.md \
            THIRD_PARTY_ASSETS.md
          do
            test -f \
              "target/macos/Davenstein.app/Contents/Resources/Documentation/$legal_file"
          done

          (
            cd target/macos
            shasum -a 256 -c Davenstein-*-macos-universal.zip.sha256
          )

      - name: Stage Universal macOS Release Packages
        run: |
          rm -rf target/release-artifacts/macos-universal
          mkdir -p target/release-artifacts/macos-universal
          cp \
            target/macos/Davenstein-*-macos-universal.zip \
            target/release-artifacts/macos-universal/
          cp \
            target/macos/Davenstein-*-macos-universal.zip.sha256 \
            target/release-artifacts/macos-universal/

      - name: Upload Universal macOS Packages
        uses: actions/upload-artifact@v7
        with:
          name: Davenstein-macOS-Universal-Packages
          path: target/release-artifacts/macos-universal/*
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs:
      - build-windows
      - build-windows-arm64
      - build-linux
      - build-linux-rpm
      - build-linux-flatpak
      # Require every supported Linux ARM release package before publishing a tagged release
      - build-linux-arm64
      - build-linux-armv7
      - build-linux-arm64-appimage
      - build-linux-arm64-flatpak
      - build-freebsd
      - build-macos
      - build-macos-universal
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download Release Artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: Davenstein-*
          path: release
          merge-multiple: true

      - name: Show Release Files
        run: find release -maxdepth 1 -type f -printf '%f  %s bytes\n' | sort

      - name: Publish Davenstein Release
        uses: softprops/action-gh-release@v3
        with:
          files: release/*
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
